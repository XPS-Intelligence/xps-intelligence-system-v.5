services:
  postgres:
    image: postgres:16-alpine
    container_name: xps-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: xps_intelligence
      POSTGRES_USER: xps
      POSTGRES_PASSWORD: change_me_now
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U xps -d xps_intelligence"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: xps-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: xps-api
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      NODE_ENV: production
      API_PORT: 4000
      DATABASE_URL: postgresql://xps:change_me_now@postgres:5432/xps_intelligence
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-dev_secret_replace_in_prod}
      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-}
      APP_URL: ${APP_URL:-http://localhost:3000}
      GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY:-}
      SERPAPI_KEY: ${SERPAPI_KEY:-}
      FIRECRAWL_API_KEY: ${FIRECRAWL_API_KEY:-}
      STEEL_API_KEY: ${STEEL_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  scraper:
    build:
      context: ./services/scraper
      dockerfile: Dockerfile
    container_name: xps-scraper
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://xps:change_me_now@postgres:5432/xps_intelligence
      REDIS_URL: redis://redis:6379
      FIRECRAWL_API_KEY: ${FIRECRAWL_API_KEY:-}
      STEEL_API_KEY: ${STEEL_API_KEY:-}
      GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY:-}
      SERPAPI_KEY: ${SERPAPI_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
