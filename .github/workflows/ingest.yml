name: xps-ingest

on:
  schedule:
    - cron: "0 6 * * *" # daily at 06:00 UTC
  workflow_dispatch:
    inputs:
      city:
        description: "Target city (e.g. Port St. Lucie, FL)"
        required: false
        default: "Port St. Lucie, FL"
      keyword:
        description: "Industry keyword"
        required: false
        default: "epoxy flooring"
      max_results:
        description: "Maximum results to ingest"
        required: false
        default: "100"

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Run data ingestion agent
        run: node scripts/agents/ingest.mjs
        env:
          CITY: ${{ github.event.inputs.city || 'Port St. Lucie, FL' }}
          KEYWORD: ${{ github.event.inputs.keyword || 'epoxy flooring' }}
          MAX_RESULTS: ${{ github.event.inputs.max_results || '100' }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          CI: true

      - name: Upload ingestion report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ingest-report-${{ github.run_number }}
          path: reports/ingest/
          retention-days: 30
